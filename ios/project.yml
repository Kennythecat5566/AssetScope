name: AssetScopeIOS
options:
  bundleIdPrefix: tw.kensuke
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
targets:
  AssetScopeIOS:
    type: application
    platform: iOS
    sources:
      - path: AssetScopeIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tw.kensuke.assetscope.ios
        PRODUCT_NAME: AssetScope
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: AssetScopeIOS/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
    scheme:
      testTargets: []
